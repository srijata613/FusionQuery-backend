version: '3.9'

services:
  # ── API Server ───────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: trustchain-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - api_logs:/app/logs
    networks:
      - trustchain-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: trustchain-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-trustchain}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-trustchain_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - trustchain-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-trustchain}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Nginx Reverse Proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: trustchain-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
    networks:
      - trustchain-net

  # ── DB Migration Runner (one-shot) ───────────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: trustchain-migrate
    command: ["node", "scripts/migrate.js"]
    env_file: .env
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - trustchain-net
    restart: "no"

volumes:
  postgres_data:
  api_logs:
  nginx_logs:

networks:
  trustchain-net:
    driver: bridge
